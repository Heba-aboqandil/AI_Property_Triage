# ---------------------------------------------------------------------------
# Layer 3 — All four EC2 microservices on a shared internal network.
#
# Usage (local dev):
#   docker compose up --build
#
# Seed the vector store before starting the RAG service:
#   docker compose run --rm rag_service python data/seed_listings.py
#
# Environment variables (.env file at layer3/ root):
#   OPENAI_API_KEY=sk-...
#   GOOGLE_API_KEY=...
#   AGENT_LLM_PROVIDER=openai   # or gemini
# ---------------------------------------------------------------------------

networks:
  layer3_net:
    driver: bridge

services:

  # -------------------------------------------------------------------------
  # 1. Guardrails Service — port 8003
  # -------------------------------------------------------------------------
  guardrails_service:
    build:
      context: .
      dockerfile: guardrails_service/Dockerfile
    image: layer3/guardrails_service:latest
    container_name: guardrails_service
    ports:
      - "8003:8003"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - layer3_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # 2. RAG Service — port 8001
  # Requires a seeded chroma_db/. No GGUF model needed — uses GPT-4o-mini.
  # -------------------------------------------------------------------------
  rag_service:
    build:
      context: .
      dockerfile: rag_service/Dockerfile
    image: layer3/rag_service:latest
    container_name: rag_service
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_PATH=/service/chroma_db
      - EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - LLAMA_MAX_TOKENS=512
      - LLAMA_TEMPERATURE=0.1
    volumes:
      - ./rag_service/chroma_db:/service/chroma_db
    networks:
      - layer3_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # 3. Image Analyser — port 8002
  # Requires a trained checkpoint at image_analyser/checkpoints/model.pth.
  # -------------------------------------------------------------------------
  image_analyser:
    build:
      context: .
      dockerfile: image_analyser/Dockerfile
    image: layer3/image_analyser:latest
    container_name: image_analyser
    ports:
      - "8002:8002"
    environment:
      - CHECKPOINT_PATH=/service/checkpoints/model.pth
      - CONFIDENCE_THRESHOLD=0.5
    volumes:
      - ./image_analyser/checkpoints:/service/checkpoints:ro
    networks:
      - layer3_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # 4. LangGraph Agent — port 8004
  # Calls rag_service and image_analyser by container name on layer3_net.
  # -------------------------------------------------------------------------
  langgraph_agent:
    build:
      context: .
      dockerfile: langgraph_agent/Dockerfile
    image: layer3/langgraph_agent:latest
    container_name: langgraph_agent
    ports:
      - "8004:8004"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_LLM_PROVIDER=${AGENT_LLM_PROVIDER:-openai}
      - RAG_SERVICE_URL=http://rag_service:8001
      - IMAGE_ANALYSER_URL=http://image_analyser:8002
    depends_on:
      - rag_service
      - image_analyser
    networks:
      - layer3_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
